<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltage Monitoring Dashboard</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; color: #2d3436; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9em; }
        .live-indicator { color: #2ecc71; font-weight: bold; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .box { background: #f1f3f5; padding: 25px; border-radius: 12px; text-align: center; border: 1px solid #e9ecef; }
        .box h3 { margin: 0; font-size: 1.1em; color: #636e72; }
        .box .value { font-size: 2.5em; font-weight: bold; color: #0984e3; margin: 10px 0; }
        .unit { font-size: 0.4em; color: #b2bec3; margin-left: 5px; }
        .ai-box { background: #e3f2fd; border-left: 8px solid #0984e3; }
        .ai-content { white-space: pre-wrap; line-height: 1.7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ ระบบตรวจสอบแรงดันไฟฟ้า IoT</h1>
        </div>
        
        <div class="status-bar">
            <div><span class="live-indicator">● LIVE</span> เชื่อมต่อกับระบบ Google Sheets</div>
            <div style="color: #636e72;">อัปเดตล่าสุด: <span id="time">รอข้อมูล...</span></div>
        </div>
        
        <div class="card grid">
            <div class="box">
                <h3>พัดลม</h3>
                <div class="value"><span id="fan">-</span><span class="unit">V</span></div>
            </div>
            <div class="box">
                <h3>ตู้เย็น</h3>
                <div class="value"><span id="fridge">-</span><span class="unit">V</span></div>
            </div>
            <div class="box">
                <h3>เครื่องฟอกอากาศ</h3>
                <div class="value"><span id="air">-</span><span class="unit">V</span></div>
            </div>
        </div>

        <div class="card ai-box">
            <h3 style="color: #0984e3; margin-top: 0;">🤖 สรุปวิเคราะห์โดย Gemini AI</h3>
            <div id="ai-text" class="ai-content">กำลังดึงข้อมูลการวิเคราะห์ล่าสุด...</div>
        </div>
    </div>

    <script>
        // *** สำคัญ: เปลี่ยน URL นี้เป็นของ Web App ใหม่ที่คุณ Deploy ***
        const API_URL = "https://script.google.com/macros/s/AKfycbwU8bRkk47zrtQPxGVlxvQj9-vckPyIG6QgnddlagC-4ZmUvDvr4LCtdUhfy3YYhji1CA/exec";

        async function updateDashboard() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.status !== "no data") {
                    document.getElementById('time').innerText = data.timestamp || "-";
                    document.getElementById('fan').innerText = data.fan || "0";
                    document.getElementById('fridge').innerText = data.fridge || "0";
                    document.getElementById('air').innerText = data.airPurifier || "0";
                    document.getElementById('ai-text').innerText = data.aiAnalysis || "รอการวิเคราะห์จาก AI...";
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('ai-text').innerText = "ไม่สามารถเชื่อมต่อกับ Google Sheets ได้ โปรดเช็คการ Deploy";
            }
        }

        // อัปเดตทุกๆ 2 วินาที
        updateDashboard();
        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
